<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great ELO Climbers - Roster</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-panel {
            width: 100%;
            max-width: 450px;
            background-color: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }
        .title-area {
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        .title-area h2 {
            color: #d4af37;
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .title-area p {
            color: #888888;
            font-size: 12px;
            margin: 5px 0 0 0;
            font-style: italic;
        }
        .row-item {
            margin: 10px 0;
            padding: 12px;
            background-color: #111111;
            border: 1px solid #333;
            border-left: 4px solid #d4af37;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rank-icon {
            font-size: 14px;
        }
        .user-link {
            color: #ffe680;
            font-weight: bold;
            font-size: 15px;
            text-decoration: none;
        }
        .tag {
            color: #ffffff;
            font-size: 11px;
            background-color: #2b2b2b;
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid #444;
            font-weight: bold;
        }
        .global-link {
            display: block;
            background-color: #222222;
            color: #d4af37;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            border: 1px solid #d4af37;
            margin-top: 15px;
        }
        .global-link:hover {
            background-color: #d4af37;
            color: #000000;
        }
    </style>
</head>
<body>

<div class="main-panel">

    <div class="title-area">
