<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great ELO Climbers Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #141414;
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.15);
        }
        .header-zone {
            text-align: center;
            border-bottom: 2px solid #262626;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header-zone h1 {
            color: #d4af37;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header-zone p {
            color: #888888;
            font-size: 13px;
            margin: 5px 0 0 0;
            font-style: italic;
        }
        .section-title {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        .member-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .member-card {
            background-color: #1c1c1c;
            border: 1px solid #2d2d2d;
            border-left: 4px solid #d4af37;
            border-radius: 6px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .member-card:hover {
            transform: scale(1.02);
            background-color: #222222;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .medal {
            font-size: 16px;
        }
        .profile-link {
            color: #ffe680;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
        }
        .profile-link:hover {
            text-decoration: underline;
        }
        .badge {
            color: #ffffff;
            font-weight: bold;
            font-size: 11px;
            background-color: #2b2b2b;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .action-button {
            display: block;
            width: 100%;
            background-color: #222222;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .action-button:hover {
            background-color: #d4af37;
            color: #000000;
        }
        .footer-credit {
            text-align: center;
            font-size: 11px;
            color: #555555;
            margin-top: 20px;
            border-top: 1px solid #222;
            padding-top: 10px;
        }
    </style>
</head>
