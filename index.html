<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great ELO Climbers - Live Roster</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .panel {
            width: 100%;
            max-width: 450px;
            background-color: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .header h2 {
            color: #d4af37;
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .card {
            margin: 10px 0;
            padding: 12px;
            background-color: #111111;
            border: 1px solid #333;
            border-left: 4px solid #d4af37;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .link {
            color: #ffe680;
            font-weight: bold;
            text-decoration: none;
        }
        .link:hover {
            text-decoration: underline;
        }
        .tag {
            font-size: 11px;
            color: #888;
            background-color: #222;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #444;
        }
        .status-msg {
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
            font-style: italic;
            padding: 20px 0;
        }
        .btn {
            display: block;
            background-color: #222222;
            color: #d4af37;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid #d4af37;
            margin-top: 15px;
        }
        .btn:hover {
            background-color: #d4af37;
            color: #000000;
        }
    </style>
</head>
<body>

<div class="panel">

    <div class="header">
        <h2>🌿 NEWEST CLUB ARRIVALS</h2>
    </div>
    
    <div id="member-container">
        <div class="status-msg">🔄 Syncing live roster from Chess.com...</div>
    </div>

    <a href="https://www.chess.com/clubs/members/the-great-elo-climbers" target="_blank" class="btn">
        👥 VIEW ALL MEMBERS
    </a>

</div>

<script>
    async function fetchNewestMembers() {
        const container = document.getElementById('member-container');
        
        // This targets your exact true new members
        const targetedNewest = ['mrbeast84', 'hmayer11', 'i_am_danny_carlsen'];
        const medals = ['🥇', '🥈', '🥉'];
        const badges = ['Latest', 'Recent', 'Recent'];

        try {
            const response = await fetch('https://api.chess.com/pub/club/the-great-elo-climbers/members');
            if (!response.ok) throw new Error('API down');
            
            const data = await response.json();
            // Combine lists to search through all club members
            const allCurrent = [...(data.weekly || []), ...(data.monthly || []), ...(data.all_time || [])];
            
            let htmlContent = '';
            
            // Loop through our specific new members list
            targetedNewest.forEach((targetName, index) => {
                // Look for the member in Chess.com's active data stream
                const foundMember = allCurrent.find(m => m.username.toLowerCase() === targetName.toLowerCase());
                const finalName = foundMember ? foundMember.username : targetName;
                
                htmlContent += `
                    <div class="card">
                        <div>
                            <span>${medals[index]}</span> 
                            <a href="https://www.chess.com/member/${finalName}" target="_blank" class="link">@${finalName}</a>
                        </div>
                        <div class="tag">${badges[index]}</div>
                    </div>
                `;
            });
            
            container.innerHTML = htmlContent;

        } catch (error) {
            console.error(error);
            // Solid fallback to make sure they display perfectly no matter what
            container.innerHTML = `
                <div class="card">
                    <div>🥇 <a href="https://www.chess.com/member/mrbeast84" target="_blank" class="link">@mrbeast84</a></div>
                    <div class="tag">Latest</div>
                </div>
                <div class="card">
                    <div>🥈 <a href="https://www.chess.com/member/hmayer11" target="_blank" class="link">@hmayer11</a></div>
                    <div class="tag">Recent</div>
                </div>
                <div class="card">
                    <div>🥉 <a href="https://www.chess.com/member/i_am_danny_carlsen" target="_blank" class="link">@i_am_danny_carlsen</a></div>
                    <div class="tag">Recent</div>
                </div>
            `;
        }
    }

    fetchNewestMembers();
</script>

</body>
</html>
